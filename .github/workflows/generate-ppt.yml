name: Generate PowerPoint

on:
  push:
    paths:
      - 'Healthcare_Data_for_AI_POV.md'
      - 'generate_ppt.py'
  workflow_dispatch:

jobs:
  generate-ppt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: |
          git clone https://github.com/kranthikrishnad/Repo1.git .
      
      - name: Set up Python
        run: |
          python3 --version
          pip install --upgrade pip
          pip install python-pptx
      
      - name: Generate PowerPoint
        run: python3 generate_ppt.py Healthcare_Data_for_AI_POV.md Healthcare_Data_for_AI_POV.pptx
      
      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
      
      - name: Commit and push generated PPTX
        run: |
          git add Healthcare_Data_for_AI_POV.pptx
          git commit -m "Generate PowerPoint presentation" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kranthikrishnad/Repo1.git
