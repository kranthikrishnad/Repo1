name: Generate PowerPoint

on:
  push:
    paths:
      - 'Healthcare_Data_for_AI_POV.md'
      - 'generate_ppt.py'
  workflow_dispatch:

jobs:
  generate-ppt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install python-pptx
      
      - name: Generate PowerPoint
        run: python generate_ppt.py Healthcare_Data_for_AI_POV.md Healthcare_Data_for_AI_POV.pptx
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: presentation
          path: Healthcare_Data_for_AI_POV.pptx
      
      - name: Commit and push generated PPTX
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Healthcare_Data_for_AI_POV.pptx
          git commit -m "Generate PowerPoint presentation" || true
          git push
